<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .title      { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .board-lbl  { font-size: 20px; font-weight: 700; fill: #ffffff; letter-spacing: 1.5px; }
      .header-lbl { font-size: 11px; font-weight: 700; fill: #cbd5e1; letter-spacing: 1.5px; }
      .pin-num    { font-size: 12px; font-weight: 700; fill: #f8fafc; text-anchor: middle; }
      .pin-lbl    { font-size: 10px; fill: #cbd5e1; text-anchor: middle; }
      .box-hdr    { font-size: 14px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .box-sub    { font-size: 12px; fill: #0f172a; }
      .box-mono   { font-size: 12.5px; fill: #0f172a; font-family: 'SFMono-Regular', Menlo, monospace; }
      .wire-lbl   { font-size: 13px; font-weight: 700; fill: #0f172a; }
      .rail-lbl   { font-size: 12px; font-weight: 700; fill: #0f172a; }
      .pin-tag    { font-size: 12px; font-weight: 700; fill: #78350f; }
      .note       { font-size: 11.5px; fill: #475569; font-style: italic; }
      .tb-lbl     { font-size: 11px; font-weight: 700; fill: #f8fafc; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1400" height="780" fill="#f8fafc"/>

  <text x="30" y="42" class="title">Arduino Uno Wiring Map</text>

  <!-- ============================ ARDUINO UNO (compact) ============================ -->
  <!-- Board: x=420..1020 (w=600), y=380..570 (h=190). USB & barrel jack on left. -->
  <g id="uno">
    <rect x="420" y="380" width="600" height="190" rx="14" ry="14" fill="#0d7a5f" stroke="#064e3b" stroke-width="2"/>
    <text x="720" y="490" class="board-lbl" text-anchor="middle">ARDUINO UNO</text>

    <rect x="385" y="410" width="45" height="46" rx="3" fill="#94a3b8" stroke="#334155" stroke-width="1.5"/>
    <text x="407" y="438" font-size="10" text-anchor="middle" fill="#0f172a" font-weight="700">USB</text>

    <rect x="385" y="530" width="40" height="28" rx="4" fill="#0f172a"/>
    <circle cx="405" cy="544" r="6" fill="#334155"/>

    <!-- DIGITAL header on top -->
    <rect x="440" y="368" width="565" height="28" rx="3" fill="#1e293b"/>

    <g id="digital-pins">
      <g transform="translate(456,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num" font-size="10">AREF</text></g>
      <g transform="translate(490,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num" font-size="10">GND</text></g>
      <g transform="translate(524,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">13</text></g>
      <g transform="translate(558,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">12</text></g>
      <g transform="translate(592,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">~11</text></g>
      <g transform="translate(626,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">~10</text></g>
      <g transform="translate(660,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b45309" stroke="#78350f"/><text y="4" class="pin-num">~9</text></g>
      <g transform="translate(694,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b45309" stroke="#78350f"/><text y="4" class="pin-num">8</text></g>
      <g transform="translate(728,382)"><rect x="-14" y="-12" width="28" height="24" fill="#15803d" stroke="#052e16"/><text y="4" class="pin-num">7</text></g>
      <g transform="translate(762,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b45309" stroke="#78350f"/><text y="4" class="pin-num">~6</text></g>
      <g transform="translate(796,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b45309" stroke="#78350f"/><text y="4" class="pin-num">~5</text></g>
      <g transform="translate(830,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b45309" stroke="#78350f"/><text y="4" class="pin-num">4</text></g>
      <g transform="translate(864,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b45309" stroke="#78350f"/><text y="4" class="pin-num">~3</text></g>
      <g transform="translate(898,382)"><rect x="-14" y="-12" width="28" height="24" fill="#b91c1c" stroke="#450a0a"/><text y="4" class="pin-num">2</text></g>
      <g transform="translate(932,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="1" class="pin-num" font-size="10">1</text><text y="11" class="pin-lbl">TX</text></g>
      <g transform="translate(966,382)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="1" class="pin-num" font-size="10">0</text><text y="11" class="pin-lbl">RX</text></g>
    </g>


    <!-- POWER + ANALOG on bottom -->
    <rect x="440" y="554" width="565" height="28" rx="3" fill="#1e293b"/>


    <g id="power-analog">
      <g transform="translate(475,568)"><rect x="-17" y="-12" width="34" height="24" fill="#0f172a"/><text y="4" class="pin-num" font-size="8">IOREF</text></g>
      <g transform="translate(514,568)"><rect x="-17" y="-12" width="34" height="24" fill="#0f172a"/><text y="4" class="pin-num" font-size="8">RESET</text></g>
      <g transform="translate(549,568)"><rect x="-15" y="-12" width="30" height="24" fill="#0f172a"/><text y="4" class="pin-num" font-size="8">3.3V</text></g>
      <g transform="translate(583,568)"><rect x="-16" y="-12" width="32" height="24" fill="#dc2626" stroke="#7f1d1d"/><text y="4" class="pin-num">5V</text></g>
      <g transform="translate(619,568)"><rect x="-16" y="-12" width="32" height="24" fill="#111827" stroke="#000"/><text y="4" class="pin-num">GND</text></g>
      <g transform="translate(655,568)"><rect x="-16" y="-12" width="32" height="24" fill="#111827" stroke="#000"/><text y="4" class="pin-num">GND</text></g>
      <g transform="translate(691,568)"><rect x="-16" y="-12" width="32" height="24" fill="#0f172a"/><text y="4" class="pin-num">VIN</text></g>

      <g transform="translate(800,568)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">A0</text></g>
      <g transform="translate(834,568)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">A1</text></g>
      <g transform="translate(868,568)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">A2</text></g>
      <g transform="translate(902,568)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">A3</text></g>
      <g transform="translate(936,568)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">A4</text></g>
      <g transform="translate(970,568)"><rect x="-14" y="-12" width="28" height="24" fill="#0f172a"/><text y="4" class="pin-num">A5</text></g>
    </g>
  </g>

  <!-- ============================ SIGNAL WIRES ============================ -->
  <g fill="none" stroke-width="2.4" stroke-linecap="round">
    <!-- Valve control fan-outs -->
    <path d="M 660 368 V 195 H 1120" stroke="#b45309"/>
    <path d="M 694 368 V 225 H 1120" stroke="#b45309"/>
    <path d="M 864 368 V 255 H 1120" stroke="#b45309"/>
    <path d="M 830 368 V 285 H 1120" stroke="#b45309"/>
    <path d="M 796 368 V 315 H 1120" stroke="#b45309"/>
    <path d="M 762 368 V 345 H 1120" stroke="#b45309"/>

    <!-- D2 -> E-STOP box (D2 wire enters the E-stop box on its right edge at y=155) -->
    <path d="M 898 368 V 155 H 430" stroke="#b91c1c"/>
    <text x="470" y="148" class="wire-lbl">D2 · E-stop sense</text>

    <!-- GND -> E-STOP box: from AREF-side GND pin (490,382) up and left to enter the E-stop box's right edge at y=175. -->
    <path d="M 490 382 V 175 H 430" stroke="#111827"/>
    <text x="500" y="170" class="wire-lbl" fill="#111827">GND · E-stop return</text>
  </g>

  <g fill="none" stroke-width="2.4" stroke-linecap="round">

    <!-- D7 -> START button -->
    <path d="M 728 368 V 352 H 60 V 660" stroke="#15803d"/>
    <text x="290" y="346" class="wire-lbl">D7 · START button</text>

    <!-- GND (START button) -->
    <path d="M 655 582 V 640 H 240 V 660" stroke="#111827"/>
    <text x="255" y="634" class="wire-lbl">GND (START button)</text>
  </g>

  <!-- Valve labels -->
  <g class="wire-lbl">
    <text x="945" y="190">K5 · TMA safety</text>
    <text x="945" y="220">K4 · H₂O safety</text>
    <text x="945" y="250">K1 · TMA</text>
    <text x="945" y="280">K2 · H₂O ALD</text>
    <text x="945" y="310">K3 · N₂</text>
    <text x="945" y="340">K8 · House main</text>
  </g>

  <g class="pin-tag">
    <text x="668" y="365">D9</text>
    <text x="702" y="365">D8</text>
    <text x="770" y="365">D6</text>
    <text x="804" y="365">D5</text>
    <text x="838" y="365">D4</text>
    <text x="872" y="365">D3</text>
  </g>

  <!-- ============================ BOTTOM BAND: LRS-50-5, terminal block, key ============================ -->

  <!-- LRS-50-5 (purple, bottom-left) -->
  <g>
    <rect x="40" y="705" width="240" height="55" rx="6" fill="#ffffff" stroke="#6d28d9" stroke-width="2.5"/>
    <rect x="40" y="705" width="240" height="22" rx="6" fill="#6d28d9"/>
    <text x="160" y="722" class="box-hdr">LRS-50-5 · 5 V, 10 A</text>
    <text x="52" y="747" class="box-sub">Powers Uno, JD-VCC and VCC</text>
  </g>

  <!-- 5 V distribution terminal block (bottom, spans middle of diagram) -->
  <g id="tb5v">
    <rect x="310" y="695" width="600" height="70" rx="6" fill="#e2e8f0" stroke="#334155" stroke-width="1.4"/>
    <text x="322" y="713" class="wire-lbl">5 V distribution terminal block</text>
    <text x="322" y="729" class="note">Shared + and GND bus bars; every 5 V load is its own branch off the block.</text>

    <rect x="322" y="737" width="576" height="10" fill="#dc2626"/>
    <text x="610" y="746" class="tb-lbl">+ 5 V bus</text>
    <rect x="322" y="749" width="576" height="10" fill="#111827"/>
    <text x="610" y="758" class="tb-lbl">GND bus</text>
  </g>

  <!-- LRS-50-5 -> block: two straight horizontal lines meeting the block's left outer border -->
  <g fill="none" stroke-width="2.4" stroke-linecap="round">
    <!-- LRS-50-5 header bar center-right is around (280, 716); block left border is at x=310 -->
    <path d="M 280 720 H 310" stroke="#dc2626"/>
    <path d="M 280 745 H 310" stroke="#111827"/>

    <!-- 5 V terminal block feeds the Uno's 5 V pin (input, not output) -->
    <path d="M 583 582 V 695" stroke="#dc2626"/>
    <!-- Uno GND (5 V-side) returns to the terminal block's GND bus -->
    <path d="M 619 582 V 695" stroke="#111827"/>
  </g>

  <!-- ============================ TOP-ROW DESTINATION BLOCKS ============================ -->

  <!-- E-STOP (top-left) -->
  <g>
    <rect x="120" y="115" width="310" height="70" rx="6" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>
    <rect x="120" y="115" width="310" height="22" rx="6" fill="#b91c1c"/>
    <text x="275" y="132" class="box-hdr">E-STOP</text>
    <text x="132" y="157" class="box-sub">Input 24  ·  D2</text>
    <text x="132" y="175" class="box-sub">Input 23  ·  GND</text>
  </g>

  <!-- START BUTTON (bottom-left, wire endpoint at y=660) -->
  <g>
    <rect x="40" y="620" width="200" height="70" rx="6" fill="#ffffff" stroke="#15803d" stroke-width="2.5"/>
    <rect x="40" y="620" width="200" height="22" rx="6" fill="#15803d"/>
    <text x="140" y="637" class="box-hdr">START BUTTON</text>
    <text x="52" y="662" class="box-sub">Input 24  ·  D7</text>
    <text x="52" y="680" class="box-sub">Input 23  ·  GND</text>
  </g>

  <!-- 8-CH RELAY MODULE (right side, no bus wire drawn to it) -->
  <g>
    <rect x="1120" y="140" width="270" height="250" rx="6" fill="#ffffff" stroke="#b45309" stroke-width="2.5"/>
    <rect x="1120" y="140" width="270" height="22" rx="6" fill="#b45309"/>
    <text x="1255" y="157" class="box-hdr">8-CH RELAY MODULE</text>
    <text x="1132" y="178" class="note">JQC3F-05VDC-C · VCC = 5 V · Active-LOW</text>

    <g class="box-mono">
      <text x="1132" y="199">IN5 · K5 · D9 · TMA safety</text>
      <text x="1132" y="229">IN4 · K4 · D8 · H₂O safety</text>
      <text x="1132" y="259">IN1 · K1 · D3 · TMA</text>
      <text x="1132" y="289">IN2 · K2 · D4 · H₂O ALD</text>
      <text x="1132" y="319">IN3 · K3 · D5 · N₂</text>
      <text x="1132" y="349">IN8 · K8 · D6 · House main</text>
    </g>

    <text x="1132" y="372" class="note">IN6, IN7 unused · VCC/GND on relay diagram</text>
  </g>

  <!-- LRS-100-24 (top-right corner) -->
  <g>
    <rect x="1120" y="50" width="270" height="60" rx="6" fill="#ffffff" stroke="#3730a3" stroke-width="2.5"/>
    <rect x="1120" y="50" width="270" height="22" rx="6" fill="#3730a3"/>
    <text x="1255" y="67" class="box-hdr">LRS-100-24 · 24 V, 108 W</text>
    <text x="1132" y="92" class="box-sub">Feeds E-stop loop &amp; solenoid valves</text>
  </g>

  <!-- Pin color key: symmetric container, centered items -->
  <!-- Container x=940..1360 (w=420), y=705..760 -->
  <g>
    <rect x="940" y="705" width="420" height="55" rx="6" fill="#ffffff" stroke="#334155" stroke-width="1.2"/>
    <text x="1150" y="724" class="wire-lbl" text-anchor="middle">Uno pin color key</text>

    <!-- 5 items with equal spacing across the container width. Container inner width = 396. 5 items -> centered around 1150. -->
    <g transform="translate(970,735)">
      <!-- Each item = swatch(12) + gap(4) + text. Item spans: 0-58, 78-136, 156-214, 234-292, 312-360 -->
      <rect x="0"   y="0" width="12" height="12" fill="#b45309" stroke="#78350f"/>
      <text x="18"  y="11" class="box-sub">valve</text>

      <rect x="78"  y="0" width="12" height="12" fill="#b91c1c" stroke="#450a0a"/>
      <text x="96"  y="11" class="box-sub">E-stop</text>

      <rect x="156" y="0" width="12" height="12" fill="#15803d" stroke="#052e16"/>
      <text x="174" y="11" class="box-sub">START</text>

      <rect x="234" y="0" width="12" height="12" fill="#dc2626" stroke="#7f1d1d"/>
      <text x="252" y="11" class="box-sub">5 V</text>

      <rect x="312" y="0" width="12" height="12" fill="#111827"/>
      <text x="330" y="11" class="box-sub">GND</text>
    </g>
  </g>

</svg>
